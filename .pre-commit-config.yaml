repos:
  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 26.3.0
    hooks:
      - id: black
        files: ^(src|tests)/
  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        files: ^(src|tests)/
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        files: ^src/
        pass_filenames: false
        args: [src/]
